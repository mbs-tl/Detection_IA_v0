<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Detection Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen flex items-center justify-center p-4" x-data="testApp()">

    <!-- ÉCRAN DE CHARGEMENT -->
    <template x-if="screen === 'loading'">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
            <p class="text-zinc-600 font-medium text-sm">Chargement des images...</p>
        </div>
    </template>

    <!-- ÉCRAN D'ERREUR -->
    <template x-if="screen === 'error'">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-red-100 text-center">
            <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
            <h2 class="text-xl font-bold mb-2">Erreur</h2>
            <p class="text-zinc-500 text-sm mb-6" x-text="errorMessage"></p>
            <button @click="location.reload()" class="w-full bg-zinc-900 text-white font-bold py-3 rounded-xl">Réessayer</button>
        </div>
    </template>

    <!-- INTRODUCTION -->
    <template x-if="screen === 'intro'">
        <div class="w-full max-w-3xl bg-white rounded-3xl shadow-xl p-8 border border-zinc-100">
            <div class="flex items-center gap-4 mb-8">
                <div class="p-4 bg-indigo-600 text-white rounded-2xl shadow-lg">
                    <i data-lucide="brain-circuit" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold">Test de Détection IA</h1>
                    <p class="text-zinc-500 text-sm">Consignes et informations</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="space-y-4">
                    <h2 class="font-bold flex items-center gap-2"><i data-lucide="info" class="w-5 h-5 text-indigo-600"></i> Consignes</h2>
                    <ul class="text-sm text-zinc-600 space-y-3">
                        <li class="flex gap-2"><b>1.</b> Identifiez si l'image est réelle ou générée par IA.</li>
                        <li class="flex gap-2"><b>2.</b> Vous avez 20 secondes par image.</li>
                        <li class="flex gap-2"><b>3.</b> Si vous connaissez l'image, elle sera remplacée.</li>
                    </ul>
                </div>

                <div class="space-y-3 bg-zinc-50 p-6 rounded-2xl">
                    <input type="number" x-model="userData.age" placeholder="Âge" class="w-full px-4 py-2 rounded-xl border border-zinc-200 text-sm">
                    <select x-model="userData.sex" class="w-full px-4 py-2 rounded-xl border border-zinc-200 text-sm bg-white">
                        <option value="Homme">Homme</option>
                        <option value="Femme">Femme</option>
                        <option value="Autre">Autre</option>
                    </select>
                    <input type="email" x-model="userData.email" placeholder="E-mail" class="w-full px-4 py-2 rounded-xl border border-zinc-200 text-sm">
                    <input type="text" x-model="userData.expertise" placeholder="Domaine (ex: Data)" class="w-full px-4 py-2 rounded-xl border border-zinc-200 text-sm">
                </div>
            </div>

            <button @click="startTest()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
                Commencer le Test <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </template>

    <!-- TEST -->
    <template x-if="screen === 'test'">
        <div class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="relative">
                <div class="absolute top-4 right-4 z-10 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4 text-zinc-600"></i>
                    <span class="font-mono font-bold" x-text="timeLeft + 's'"></span>
                </div>
                <div class="aspect-[4/3] rounded-3xl overflow-hidden bg-zinc-200 shadow-2xl border-4 border-white">
                    <img :src="currentImage.url" class="w-full h-full object-cover">
                </div>
                <div class="mt-4 flex justify-between items-center px-2">
                    <span class="text-sm font-medium text-zinc-400" x-text="'Image ' + (currentIdx + 1) + ' / ' + images.length"></span>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl p-8 border border-zinc-100 flex flex-col min-h-[500px]">
                <!-- KNOWLEDGE CHECK -->
                <div x-show="isKnowledgeCheck" class="flex-1 flex flex-col justify-center text-center">
                    <h3 class="text-xl font-bold mb-4">Connaissez-vous cette image ?</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <button @click="handleKnowledge(true)" class="bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">Oui, je la connais</button>
                        <button @click="handleKnowledge(false)" class="bg-white border-2 border-zinc-100 font-bold py-4 rounded-2xl">Non, jamais vue</button>
                    </div>
                </div>

                <!-- PREDICTION -->
                <div x-show="!isKnowledgeCheck" class="flex-1 flex flex-col" x-cloak>
                    <h2 class="text-xl font-bold mb-6">Réelle ou IA ?</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button @click="prediction = 'Réelle'" :class="prediction === 'Réelle' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-4 rounded-2xl font-bold border-2 transition-all">Réelle</button>
                        <button @click="prediction = 'IA'" :class="prediction === 'IA' ? 'bg-amber-50 border-amber-500 text-amber-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-4 rounded-2xl font-bold border-2 transition-all">IA</button>
                    </div>

                    <div x-show="prediction === 'IA'" class="mb-8">
                        <p class="text-sm font-bold mb-3">Pourquoi ?</p>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="r in REASONS" :key="r.id">
                                <button @click="toggleReason(r.label)" :class="selectedReasons.includes(r.label) ? 'bg-indigo-600 text-white' : 'bg-zinc-50 text-zinc-600'" class="px-3 py-2 rounded-xl text-xs font-medium border" x-text="r.label"></button>
                            </template>
                        </div>
                    </div>

                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between items-center text-sm font-bold">
                            <label>Confiance</label>
                            <span class="text-indigo-600" x-text="confidence + '%'"></span>
                        </div>
                        <input type="range" min="0" max="100" x-model="confidence" class="w-full h-2 bg-zinc-100 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <button @click="nextImage(false)" class="mt-auto w-full bg-zinc-900 text-white font-bold py-4 rounded-2xl">Suivant</button>
                </div>
            </div>
        </div>
    </template>

    <!-- FIN -->
    <template x-if="screen === 'finish'">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-12 text-center border border-zinc-100">
            <i data-lucide="check-circle-2" class="w-16 h-16 text-emerald-500 mx-auto mb-6"></i>
            <h2 class="text-3xl font-bold mb-4">Terminé !</h2>
            <p class="text-zinc-500 mb-8">Vos réponses ont été envoyées à Google Sheet.</p>
            <button @click="location.reload()" class="w-full bg-zinc-100 font-bold py-4 rounded-xl">Recommencer</button>
        </div>
    </template>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIv2QgH6vGyC6YZ4ecA2rlZ5jxG4gloXzWhr7yCpupw9p4GdCxJi10xlFozPr_qNDVxg/exec";
        const REPO_PATH = "mbs-tl/Detection_IA_v0"; 
        const REASONS = [
            { id: 'lighting', label: 'Éclairage' },
            { id: 'background', label: 'Arrière-plan' },
            { id: 'anatomy', label: 'Anatomie' },
            { id: 'objects', label: 'Objets' },
            { id: 'cohesiveness', label: 'Cohérence' },
            { id: 'textures', label: 'Textures' },
            { id: 'other', label: 'Autre' }
        ];

        function testApp() {
            return {
                screen: 'loading',
                userData: { age: '', sex: 'Homme', email: '', expertise: '' },
                images: [],
                poolReal: [],
                poolIA: [],
                currentIdx: 0,
                timeLeft: 20,
                timer: null,
                prediction: null,
                selectedReasons: [],
                confidence: 50,
                isKnowledgeCheck: true,
                REASONS: REASONS,
                errorMessage: '',

                get currentImage() {
                    return this.images[this.currentIdx] || { url: '', type: '' };
                },

                async init() {
                    try {
                        const fetchFolder = async (path, type) => {
                            const res = await fetch(`https://api.github.com/repos/${REPO_PATH}/contents/${path}`);
                            if (!res.ok) throw new Error(`Dossier ${path} non trouvé`);
                            const files = await res.json();
                            return files.filter(f => /\.(jpe?g|png|webp)$/i.test(f.name)).map(f => ({ url: f.download_url, type }));
                        };
                        const [reelles, ia, r_reelles, r_ia] = await Promise.all([
                            fetchFolder('im_real', 'Réelle'),
                            fetchFolder('im_ia', 'IA'),
                            fetchFolder('remplacement_im_real', 'Réelle'),
                            fetchFolder('remplacement_im_ia', 'IA')
                        ]);
                        this.images = [...reelles, ...ia].sort(() => Math.random() - 0.5);
                        this.poolReal = r_reelles.map(img => img.url).sort(() => Math.random() - 0.5);
                        this.poolIA = r_ia.map(img => img.url).sort(() => Math.random() - 0.5);
                        this.screen = 'intro';
                    } catch (err) {
                        this.errorMessage = err.message;
                        this.screen = 'error';
                    }
                    this.$watch('screen', () => this.$nextTick(() => lucide.createIcons()));
                },

                startTest() {
                    if (!this.userData.age || !this.userData.email) return alert("Veuillez remplir les champs.");
                    this.screen = 'test';
                    this.resetTimer();
                },

                handleKnowledge(known) {
                    if (known) {
                        const type = this.currentImage.type;
                        let newUrl = (type === 'Réelle') ? this.poolReal.pop() : this.poolIA.pop();
                        if (newUrl) this.images[this.currentIdx].url = newUrl;
                        else alert("Plus d'images de remplacement.");
                    }
                    this.isKnowledgeCheck = false;
                    this.resetTimer();
                },

                resetTimer() {
                    clearInterval(this.timer);
                    if (this.isKnowledgeCheck) return;
                    this.timeLeft = 20;
                    this.timer = setInterval(() => {
                        this.timeLeft--;
                        if (this.timeLeft <= 0) {
                            clearInterval(this.timer);
                            this.nextImage(true); // Temps écoulé
                        }
                    }, 1000);
                },

                toggleReason(label) {
                    if (this.selectedReasons.includes(label)) this.selectedReasons = this.selectedReasons.filter(x => x !== label);
                    else this.selectedReasons.push(label);
                },

                nextImage(isTimeout = false) {
                    if (!isTimeout && !this.prediction) return alert("Veuillez choisir Réelle ou IA");
                    
                    // Envoi à Google Sheet
                    this.saveResult(isTimeout ? "Pas de réponse" : this.prediction);

                    this.currentIdx++;
                    if (this.currentIdx >= this.images.length) {
                        clearInterval(this.timer);
                        this.screen = 'finish';
                    } else {
                        this.prediction = null;
                        this.selectedReasons = [];
                        this.confidence = 50;
                        this.isKnowledgeCheck = true;
                        this.resetTimer();
                    }
                },

                saveResult(pred) {
                    const data = {
                        date: new Date().toLocaleString('fr-FR'),
                        email: this.userData.email,
                        age: this.userData.age,
                        genre: this.userData.sex,
                        domaine: this.userData.expertise,
                        img_url: this.currentImage.url,
                        type: this.currentImage.type,
                        prediction: pred,
                        temps_rep: (20 - this.timeLeft).toFixed(2),
                        raison: this.selectedReasons.join(', '),
                        confiance: this.confidence
                    };
                    
                    fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: 'no-cors',
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    }).catch(e => console.error(e));
                }
            }
        }
    </script>
</body>
</html>
